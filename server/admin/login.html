<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — Fold</title>
  <link rel="stylesheet" href="admin.css">
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <h1>Fold Admin</h1>
      <p>Sign in to manage your store</p>
      <div class="error" id="login-error">Invalid username or password</div>
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" autocomplete="username" autofocus>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" autocomplete="current-password">
      </div>
      <button class="btn btn-primary btn-block" id="login-btn" onclick="login()">Sign In</button>
    </div>
  </div>
  <script>
    document.getElementById('password').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') login();
    });

    async function login() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const errorEl = document.getElementById('login-error');
      const btn = document.getElementById('login-btn');

      if (!username || !password) {
        errorEl.textContent = 'Please enter username and password';
        errorEl.classList.add('show');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Signing in...';
      errorEl.classList.remove('show');

      try {
        const res = await fetch('/api/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
        });
        const data = await res.json();
        if (!res.ok) {
          errorEl.textContent = data.error || 'Invalid credentials';
          errorEl.classList.add('show');
          return;
        }
        localStorage.setItem('fold_admin_token', data.token);
        localStorage.setItem('fold_admin_user', data.username);
        window.location.href = 'dashboard.html';
      } catch (err) {
        errorEl.textContent = 'Connection error. Is the server running?';
        errorEl.classList.add('show');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    }
  </script>
</body>
</html>
